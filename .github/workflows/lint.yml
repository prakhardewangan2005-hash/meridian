name: lint
on:
  push: { branches: [main] }
  pull_request: {}
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install linters
        run: pip install ruff mypy yamllint
      - run: ruff check .
      - run: ruff format --check .
      - run: yamllint -c .yamllint.yml config deploy
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh tools/*.sh
      - name: mypy (advisory)
        run: mypy services libs || true

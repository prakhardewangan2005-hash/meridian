name: docs
on:
  pull_request:
    paths: ["config/slo/**", "docs/**", "tools/docs-build.sh"]
permissions:
  contents: read
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - name: Render generated docs
        run: ./tools/docs-build.sh
      - name: Verify SLO catalog renders cleanly
        run: test -f docs/slo-catalog.generated.md

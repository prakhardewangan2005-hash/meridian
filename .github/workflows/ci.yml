name: ci
on:
  push: { branches: [main] }
  pull_request: {}
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "libs/meridian_common"
          pip install -e "libs/meridian_proto"
          pip install -e "services/agent[dev]"
          pip install -e "services/controller[dev]"
          pip install -e "services/cli[dev]"
          pip install -e "services/chaos[dev]"
      - name: Run unit + integration tests
        run: |
          pytest services/agent/tests services/chaos/tests services/cli/tests \
            services/controller/tests -q

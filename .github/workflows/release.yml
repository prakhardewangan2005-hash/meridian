name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Build wheels
        run: |
          pip install build
          for pkg in libs/meridian_common libs/meridian_proto services/agent services/controller services/cli services/chaos; do
            python -m build "$pkg" --outdir dist/
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations/alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF", "PL", "ASYNC", "S", "C4"]
ignore = [
  "PLR0913",  # too-many-arguments
  "S101",     # use of assert (we use it in tests)
  "S104",     # 0.0.0.0 binding (intentional in our exporters)
  "S108",     # hardcoded temp file (/tmp is intentional for chaos/disk-fill)
  "S110",     # try-except-pass (intentional in optional/best-effort paths)
  "S112",     # try-except-continue (intentional in best-effort loops)
  "BLE001",   # blind except Exception (probes/runner must never crash)
  "SIM102",   # collapsible if
  "SIM105",   # use contextlib.suppress
  "SIM117",   # combine multiple with-statements
  "SIM210",   # if-expr with true/false
  "B017",     # assert raises Exception (fine in tests)
  "B027",     # empty method without abstract decorator
  "E501",     # line too long
  "PLR0912",  # too-many-branches
  "PLR0915",  # too-many-statements
  "PLR2004",  # magic value in comparison
  "PLW2901",  # loop variable overwritten
  "C901",     # function too complex
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "PL"]
"benchmarks/**" = ["S", "PL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["dns.*", "uvloop.*", "prometheus_client.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-ra --strict-markers --strict-config"
markers = [
  "slow: tests that take >1s",
  "integration: requires external services",
  "chaos: chaos/fault-injection tests",
]

---
- name: Create meridian group
  ansible.builtin.group:
    name: "{{ meridian_group }}"
    system: true

- name: Create meridian user
  ansible.builtin.user:
    name: "{{ meridian_user }}"
    group: "{{ meridian_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ meridian_state_dir }}"
    create_home: false

- name: Create config and state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ meridian_user }}"
    group: "{{ meridian_group }}"
    mode: "0750"
  loop:
    - "{{ meridian_config_dir }}"
    - "{{ meridian_config_dir }}/pki"
    - "{{ meridian_state_dir }}"
    - "{{ meridian_state_dir }}/buffer"

- name: Install agent binary
  ansible.builtin.copy:
    src: "meridian-agent-{{ meridian_version }}"
    dest: /usr/local/bin/meridian-agent
    mode: "0755"
  notify: restart meridian-agent

- name: Render agent config
  ansible.builtin.template:
    src: agent.yaml.j2
    dest: "{{ meridian_config_dir }}/agent.yaml"
    owner: "{{ meridian_user }}"
    group: "{{ meridian_group }}"
    mode: "0640"
  notify: restart meridian-agent

- name: Install systemd unit
  ansible.builtin.template:
    src: meridian-agent.service.j2
    dest: /etc/systemd/system/meridian-agent.service
    mode: "0644"
  notify:
    - reload systemd
    - restart meridian-agent

- name: Enable and start the agent
  ansible.builtin.systemd:
    name: meridian-agent
    enabled: true
    state: started
    daemon_reload: true

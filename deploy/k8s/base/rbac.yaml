apiVersion: v1
kind: ServiceAccount
metadata:
  name: meridian-agent
  namespace: meridian
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: meridian-controller
  namespace: meridian
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meridian-controller
  namespace: meridian
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meridian-controller
  namespace: meridian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: meridian-controller
subjects:
  - kind: ServiceAccount
    name: meridian-controller
    namespace: meridian

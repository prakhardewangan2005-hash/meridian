apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: meridian-controller
  namespace: meridian
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: controller
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: agent
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to: []
      ports:
        - protocol: TCP
          port: 9090
        - protocol: UDP
          port: 53

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: meridian-dev

rule_files:
  - /etc/prometheus/recording-rules/*.yml
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: meridian-agent
    static_configs:
      - targets: ["agent:9101"]
        labels:
          service: agent

  - job_name: meridian-controller
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["controller:8443"]
        labels:
          service: controller

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="page"']
      receiver: pager
      group_wait: 10s
      repeat_interval: 1h
    - matchers: ['severity="ticket"']
      receiver: tickets

receivers:
  - name: default
    # In dev, alerts just sit in the Alertmanager UI.
  - name: pager
    # webhook_configs:
    #   - url: https://pagerduty-bridge.meridian.local/hook
  - name: tickets
    # webhook_configs:
    #   - url: https://jira-bridge.meridian.local/hook

inhibit_rules:
  # If a node is down, suppress its probe-staleness noise.
  - source_matchers: ['alertname="AgentDown"']
    target_matchers: ['alertname="ProbeStaleness"']
    equal: ["instance"]
